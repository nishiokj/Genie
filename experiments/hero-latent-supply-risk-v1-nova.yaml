experiment:
  id: hero_latent_supply_risk_v1_nova
  name: "Hero Latent Supply Risk v1: Nova Variant Experiment"
  description: >-
    Bucephalus runs Nova over a small, curated Genie-seeded latent supply-risk
    corpus. The paired variants test whether an evidence-first configuration
    improves detection of world-event-to-enterprise-exposure chains while
    preserving no-alert restraint.
  tags: [hero-demo, latent-supply-risk, nova, genie, substrate, paired-variants]

runtime:
  compute: { backend: local-docker }
  storage: { backend: local-fs, config: { root: .lab/runs/ } }
  traces: { backend: local-stdout }
  secrets:
    - name: CODEX_OAUTH
      from: file
      mount:
        target: /root/.codex/auth.json
        required_for_variants: [baseline, evidence_first]
      credential_cache:
        kind: run_scoped
        target: /bucephalus/credentials/codex_oauth/auth.json
        env: CODEX_AUTH_CACHE_FILE
  network:
    task_sandbox: none
    agent: full

matrix:
  variants:
    - id: baseline
      baseline: true
      config:
        mode: baseline
        model_provider: codex
        model: gpt-5.4
        reasoning: low
    - id: evidence_first
      config:
        mode: evidence_first
        model_provider: codex
        model: gpt-5.4
        reasoning: low
  cases:
    source: file
    path: ../data/latent_supply_risk/tasks/hero-latent-supply-risk-v1-seed-curated.public_case_rows.jsonl
  repeats: 1
  seeds: [20260527]

scheduling:
  max_concurrency: 1
  shuffle_tasks: false
  random_seed: 20260527
  comparison: paired

stages:
  case:
    interface: writable_workspace
    workspace:
      source: container_image
      image: { from: case_row }
      workdir: { from: case_row }
  agent:
    image: latent-supply-risk-workspaces:local
    command:
      - python3
      - run_nova_latent_supply_risk.py
      - --mode
      - $mode
      - --provider
      - $model_provider
      - --model
      - $model
      - --reasoning
      - $reasoning
    integration_level: cli_events
    events:
      - id: nova_events
        format: jsonl
        mode: jsonl
        ingest: true
        retain_raw: true
    outputs:
      result:
        capture:
          type: file
          path: /bucephalus/out/result.json
          format: json
          required: true
      trajectory:
        capture:
          type: file
          path: /bucephalus/out/nova-events.jsonl
          format: text
          required: false
      nova_stdout:
        capture:
          type: file
          path: /bucephalus/out/nova-stdout.log
          format: text
          required: false
      nova_stderr:
        capture:
          type: file
          path: /bucephalus/out/nova-stderr.log
          format: text
          required: false
  execution:
    agent_site: agent_container
  grader:
    strategy: separate
    separate:
      image: python:3.11-slim
      workdir: /grader
    command:
      - python3
      - -c
      - |
        # $
        import json, pathlib, re
        sep = chr(47)
        path = lambda *parts: sep + sep.join(parts)
        oracles = {
          "LSR-001": {"zero_alert_run": False, "true_alerts": [{"source_headlines": ["H03"], "latent_edge": {"required_concepts": ["gujarat", "castor", "polyol", "coating"]}, "hidden_dependency_path": ["castor_derived_polyol", "CR-88", "CMC-410", "SO-7731"], "business_exposure": {"revenue_at_risk": 4200000, "affected_orders": ["SO-7731"], "affected_customers": ["Atlantic Energy"], "constrained_inventory": True}}]},
          "LSR-014": {"zero_alert_run": False, "true_alerts": [{"source_headlines": ["H01"], "latent_edge": {"required_concepts": ["resin", "rosin", "flux", "electronics"]}, "hidden_dependency_path": ["rosin_ester_flux", "ASM-44", "MTG-220", "SO-7844"], "business_exposure": {"revenue_at_risk": 3692000, "affected_orders": ["SO-7844"], "affected_customers": ["Mercy North Hospitals"], "constrained_inventory": True}}]},
          "LSR-027": {"zero_alert_run": True, "true_alerts": []},
          "LSR-033": {"zero_alert_run": False, "true_alerts": [{"source_headlines": ["H01"], "latent_edge": {"required_concepts": ["silicon metal", "silicone", "elastomer", "potting"]}, "hidden_dependency_path": ["silicone_elastomer", "POT-72", "RSG-700", "SO-7991"], "business_exposure": {"revenue_at_risk": 3330000, "affected_orders": ["SO-7991"], "affected_customers": ["Canal Rail"], "constrained_inventory": True}}]},
          "LSR-052": {"zero_alert_run": False, "true_alerts": [{"source_headlines": ["H01"], "latent_edge": {"required_concepts": ["antimony", "trioxide", "flame", "cable"]}, "hidden_dependency_path": ["antimony_trioxide_synergist", "FJ-31", "EVB-330", "SO-8207"], "business_exposure": {"revenue_at_risk": 3360000, "affected_orders": ["SO-8207"], "affected_customers": ["Metro Tunnel Authority"], "constrained_inventory": True}}]},
          "LSR-041": {"zero_alert_run": True, "true_alerts": []},
        }
        case_path = pathlib.Path(path("grader", "in", "case_id.txt"))
        case_id = case_path.read_text().strip() if case_path.exists() else ""
        raw_result = json.loads(pathlib.Path(path("grader", "in", "result.json")).read_text())
        result = raw_result
        if isinstance(raw_result, dict) and isinstance(raw_result.get("response"), str):
          try:
            result = json.loads(raw_result["response"])
          except json.JSONDecodeError:
            result = raw_result
        scan = result.get("scan", {}) if isinstance(result, dict) else {}
        if case_id in ("", "null", "None"):
          for candidate in [raw_result.get("case_id") if isinstance(raw_result, dict) else "", scan.get("run_id"), result.get("run_id") if isinstance(result, dict) else "", raw_result.get("response") if isinstance(raw_result, dict) else ""]:
            match = re.search(r"LSR-[0-9]+", str(candidate))
            if match:
              case_id = match.group(0)
              break
        if case_id in ("", "null", "None") or scan.get("run_id") == "preflight-contract-probe":
          pathlib.Path(path("grader", "out")).mkdir(parents=True, exist_ok=True)
          pathlib.Path(path("grader", "out", "latent-supply-risk-grade.json")).write_text(json.dumps({"case_id":"preflight-contract-probe","passed":True,"score":1.0,"checks":{"contract_probe":True},"false_positive_count":0}, indent=2, sort_keys=True) + "\n")
          raise SystemExit(0)
        def safe_int(value):
          try:
            return int(value)
          except (TypeError, ValueError):
            return None
        def schema_valid(scan):
          if not isinstance(scan, dict):
            return False
          if not all(k in scan for k in ("run_id", "result", "alerts", "no_alert_rationale")):
            return False
          if scan.get("result") not in ("alerts_found", "no_alert") or not isinstance(scan.get("alerts"), list):
            return False
          for alert in scan.get("alerts", []):
            if not isinstance(alert, dict):
              return False
            required = ("id","confidence","source_headlines","latent_edge_hypothesis","real_world_prior","enterprise_path","business_exposure","reasoning","citations","uncertainty")
            if not all(k in alert for k in required):
              return False
            exposure = alert.get("business_exposure")
            citations = alert.get("citations")
            if not isinstance(exposure, dict) or not all(k in exposure for k in ("revenue_at_risk","affected_orders","affected_customers","constrained_inventory")):
              return False
            if not isinstance(citations, dict) or not isinstance(citations.get("headlines"), list) or not isinstance(citations.get("records"), list):
              return False
            if not isinstance(alert.get("source_headlines"), list) or not isinstance(alert.get("enterprise_path"), list) or not isinstance(alert.get("uncertainty"), list):
              return False
          return True
        if not schema_valid(scan):
          pathlib.Path(path("grader", "out")).mkdir(parents=True, exist_ok=True)
          pathlib.Path(path("grader", "out", "latent-supply-risk-grade.json")).write_text(json.dumps({"case_id":case_id,"passed":False,"score":0.0,"checks":{"schema_valid":False},"false_positive_count":0}, indent=2, sort_keys=True) + "\n")
          raise SystemExit(0)
        oracle = oracles[case_id]
        alerts = scan.get("alerts") if isinstance(scan.get("alerts"), list) else []
        expected_result = "no_alert" if oracle["zero_alert_run"] else "alerts_found"
        checks = {"result_correct": scan.get("result") == expected_result}
        false_positive_count = 0
        if oracle["zero_alert_run"]:
          checks.update({"source_headline": len(alerts) == 0, "latent_edge": len(alerts) == 0, "enterprise_path": len(alerts) == 0, "business_exposure": len(alerts) == 0, "citations": bool(scan.get("no_alert_rationale")), "calibrated_uncertainty": bool(scan.get("no_alert_rationale"))})
          false_positive_count = len(alerts)
        else:
          expected = oracle["true_alerts"][0]
          alert = alerts[0] if alerts else {}
          text = " ".join(str(alert.get(k, "")) for k in ["latent_edge_hypothesis", "real_world_prior", "reasoning"]).lower()
          enterprise_path = [str(x) for x in alert.get("enterprise_path", [])]
          enterprise_text = " ".join(enterprise_path).lower()
          exposure = alert.get("business_exposure", {}) if isinstance(alert.get("business_exposure"), dict) else {}
          citations = alert.get("citations", {}) if isinstance(alert.get("citations"), dict) else {}
          concepts = expected["latent_edge"]["required_concepts"]
          exp = expected["business_exposure"]
          checks.update({
            "source_headline": bool(set(alert.get("source_headlines", [])).intersection(expected["source_headlines"])),
            "latent_edge": sum(1 for c in concepts if c.lower() in text) >= max(2, len(concepts) - 1),
            "enterprise_path": all(x in enterprise_path or x.lower() in enterprise_text for x in expected["hidden_dependency_path"]),
            "business_exposure": safe_int(exposure.get("revenue_at_risk")) == int(exp["revenue_at_risk"]) and set(exp["affected_orders"]).issubset(set(exposure.get("affected_orders", []))) and set(exp["affected_customers"]).issubset(set(exposure.get("affected_customers", []))) and bool(exposure.get("constrained_inventory")) == bool(exp["constrained_inventory"]),
            "citations": bool(citations.get("headlines")) and bool(citations.get("records")),
            "calibrated_uncertainty": bool(alert.get("uncertainty")),
          })
          false_positive_count = max(0, len(alerts) - 1)
        weights = {"result_correct":20,"source_headline":10,"latent_edge":20,"enterprise_path":20,"business_exposure":15,"citations":10,"calibrated_uncertainty":5}
        points = sum(weights[k] for k, v in checks.items() if v)
        score = max(0.0, (points - 20 * false_positive_count) * pow(float(sum(weights.values())), -1))
        report = {"case_id": case_id, "passed": score >= 0.85 and false_positive_count == 0 and bool(checks.get("business_exposure")), "score": round(score, 4), "checks": checks, "false_positive_count": false_positive_count}
        pathlib.Path(path("grader", "out")).mkdir(parents=True, exist_ok=True)
        pathlib.Path(path("grader", "out", "latent-supply-risk-grade.json")).write_text(json.dumps(report, indent=2, sort_keys=True) + "\n")
    inputs:
      result:
        source:
          output: agent.result
        materialize:
          as: file
          path: /grader/in/result.json
        required: true
      case_id:
        source:
          case: id
        materialize:
          as: file
          path: /grader/in/case_id.txt
        required: false
    outputs:
      grade:
        capture:
          type: file
          path: /grader/out/latent-supply-risk-grade.json
          format: json
          required: true

metrics:
  - id: pass_rate
    label: Pass Rate
    source:
      type: grader_output
      output: grade
      pointer: /passed
    direction: maximize
    primary: true
  - id: score
    label: Evidence-Weighted Score
    source:
      type: grader_output
      output: grade
      pointer: /score
    direction: maximize
  - id: false_positive_count
    label: False Positive Count
    source:
      type: grader_output
      output: grade
      pointer: /false_positive_count
    direction: minimize

policy:
  timeout_ms: 960000
  sanitization_profile: perf_benchmark
  task_sandbox: {}
